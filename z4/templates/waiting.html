<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Выполнение расчета</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .step { padding: 12px; border-bottom: 1px solid #eee; display: flex; align-items: flex-start; transition: all 0.3s; }
        .step-icon { width: 30px; font-weight: bold; flex-shrink: 0; margin-top: 2px; }
        .waiting { color: #ccc; }
        .running { color: #0d6efd; font-weight: bold; background: #f0f7ff; }
        .done { color: #198754; }
        .error { color: #dc3545; background: #fff5f5; }
        .details { font-size: 0.85em; color: #666; font-weight: normal; margin-top: 4px; }
        .label { flex-grow: 1; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7 card shadow p-4">
                <h3 class="mb-4 text-center">Процесс моделирования</h3>
                
                <div id="steps-container">
                    <div id="step-geometry" class="step waiting">
                        <div class="step-icon">○</div> 
                        <div class="label">Запуск геометрии (Python)</div>
                    </div>

                    <div id="step-edp" class="step waiting">
                        <div class="step-icon">○</div> 
                        <div class="label">Подготовка .EDP файла</div>
                    </div>

                    <div id="step-simulation" class="step waiting">
                        <div class="step-icon">○</div> 
                        <div class="label">
                            Моделирование FreeFem++
                            <div id="simulation-details" class="details"></div>
                        </div>
                    </div>

                    <div id="step-processing" class="step waiting">
                        <div class="step-icon">○</div> 
                        <div class="label">Аппроксимация (Gauss Fit)</div>
                    </div>

                    <div id="step-thermal" class="step waiting">
                        <div class="step-icon">○</div> 
                        <div class="label">
                            Расчет теплового слоя и графики
                            <div id="thermal-details" class="details"></div>
                        </div>
                    </div>
                </div>

                <div id="error-box" class="alert alert-danger mt-4 d-none">
                    <strong>Ошибка:</strong> <span id="error-text"></span>
                    <br><a href="/" class="btn btn-sm btn-outline-danger mt-2">Вернуться назад</a>
                </div>

                <div class="text-center mt-4">
                    <div class="spinner-border text-primary" id="main-spinner" role="status"></div>
                    <p class="text-muted mt-2" id="status-msg">Пожалуйста, не закрывайте вкладку...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateProgress() {
            fetch('/progress')
                .then(res => res.json())
                .then(data => {
                    // Обработка критической ошибки
                    if (data.error) {
                        document.getElementById('error-box').classList.remove('d-none');
                        document.getElementById('error-text').innerText = data.error;
                        document.getElementById('main-spinner').classList.add('d-none');
                        document.getElementById('status-msg').innerText = "Расчет остановлен";
                        return;
                    }

                    // Обновляем статусы всех шагов
                    updateStepState('step-geometry', data.geometry.status);
                    updateStepState('step-edp', data.edp_prep.status);
                    updateStepState('step-simulation', data.simulation.status, data.simulation.details, 'simulation-details');
                    updateStepState('step-processing', data.processing.status);
                    updateStepState('step-thermal', data.thermal.status, data.thermal.details, 'thermal-details');

                    // Если всё готово
                    if (data.complete) {
                        document.getElementById('status-msg').innerText = "Готово! Перенаправление...";
                        setTimeout(() => window.location.href = '/result', 1000);
                    } else {
                        setTimeout(updateProgress, 800); // Опрашиваем чуть чаще для плавности
                    }
                })
                .catch(err => {
                    console.error("Ошибка связи с сервером", err);
                    setTimeout(updateProgress, 2000);
                });
        }

        function updateStepState(id, status, details = null, detailsId = null) {
            const el = document.getElementById(id);
            if (!el) return;

            const icon = el.querySelector('.step-icon');
            
            // Установка классов
            el.className = 'step ' + status;
            
            // Иконка
            if (status === 'running') icon.innerText = '●';
            else if (status === 'done') icon.innerText = '✓';
            else if (status === 'error') icon.innerText = '✕';
            else icon.innerText = '○';

            // Детали (текст под шагом)
            if (detailsId && details) {
                document.getElementById(detailsId).innerText = details;
            }
        }

        // Запуск цикла опроса
        updateProgress();
    </script>
</body>
</html>
