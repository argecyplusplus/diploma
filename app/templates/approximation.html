{% extends "base.html" %}

{% block content %}
<div class="approx-container">
    <div class="section-header">
        <h2>Аппроксимация профиля</h2>
    </div>

    <div class="control-panel">
        <label for="bladeSelect">Выберите лопатку:</label>
        <select id="bladeSelect" onchange="onBladeSelect(this.value)">
            <option value="">-- Выберите лопатку --</option>
        </select>
        <button class="btn-secondary" id="retryBtn" style="display:none;" onclick="executeApproximation()">🔄 Повторить</button>
    </div>

    <div id="loading" class="loading-indicator" style="display:none;">⏳ Выполняется расчет и сохранение в БД...</div>
    <div id="error" class="error-message"></div>

    <div id="results" style="display:none;">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('plot')">📊 График</button>
            <button class="tab-btn" onclick="switchTab('coords')">📐 Координаты</button>
            <button class="tab-btn" onclick="switchTab('coeffs')">🔢 Коэффициенты Лежандра</button>
            <button class="tab-btn" onclick="switchTab('params')">📈 Параметры</button>
        </div>

        <div id="tab-plot" class="tab-content active">
            <img id="plotImg" src="" alt="График аппроксимации">
            <button class="btn-secondary" onclick="savePlot()" style="margin-top:10px;">💾 Сохранить график (PNG)</button>
        </div>

        <div id="tab-coords" class="tab-content">
            <table class="data-table">
                <thead><tr><th>Тип</th><th>X</th><th>Y</th></tr></thead>
                <tbody id="coordsBody"></tbody>
            </table>
            <button class="btn-secondary" onclick="saveTable('coords')">💾 Сохранить CSV</button>
        </div>

        <div id="tab-coeffs" class="tab-content">
            <table class="data-table">
                <thead><tr><th>Степень (n)</th><th>Верхний профиль</th><th>Нижний профиль</th></tr></thead>
                <tbody id="coeffsBody"></tbody>
            </table>
            <button class="btn-secondary" onclick="saveTable('coeffs')">💾 Сохранить CSV</button>
        </div>

        <div id="tab-params" class="tab-content">
            <table class="data-table">
                <thead><tr><th>Профиль</th><th>Max Y</th><th>X при Max</th><th>R²</th></tr></thead>
                <tbody id="paramsBody"></tbody>
            </table>
            <button class="btn-secondary" onclick="saveTable('params')">💾 Сохранить CSV</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/approximation.js') }}"></script>
{% endblock %}
