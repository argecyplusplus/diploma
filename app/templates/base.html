<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Pro — моделирование лопаток ГТД</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <h1>FF Pro</h1>
        <p>моделирование лопаток ГТД</p>
    </div>
    <nav class="sidebar-nav">
        <a href="/" class="nav-item" data-path="/">Главная</a>
        <a href="/blades" class="nav-item" data-path="/blades">Лопатки</a>
        <a href="/approximation" class="nav-item" data-path="/approximation">Аппроксимация</a>
        <a href="/materials" class="nav-item" data-path="/materials">Материалы</a>
        <a href="/simulation" class="nav-item" data-path="/simulation">Моделирование</a>
        <!-- Two-Blade будет добавлен позже, пока скрыт -->
        <!-- <a href="/two-blade" class="nav-item" data-path="/two-blade">Двухлопаточная</a> -->
    </nav>
</aside>

<header class="header">
    <div class="db-status">
        <span class="db-badge"></span>
        <span id="db-status-text">БД не выбрана</span>
    </div>
    <div class="settings-btn" onclick="openModal('settingsModal')">
        ⚙️ Настройки
    </div>
</header>

<main class="main">
    {% block content %}
    <div style="text-align: center; padding: 40px; color: var(--text-muted);">
        <h2>Добро пожаловать в FF Pro</h2>
        <p>Выберите раздел в меню слева для начала работы</p>
    </div>
    {% endblock %}
</main>

<!-- Modal Настройки -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h3>⚙️ Настройки FF Pro</h3>
        <div class="form-group">
            <label>📁 База данных</label>
            <div class="db-list" id="dbList"></div>
            <div class="flex-between" style="margin-top: 12px;">
                <input type="text" id="newDbName" placeholder="Имя новой БД..." style="flex:1;">
                <button class="btn-primary" onclick="createDb()" style="white-space: nowrap;">Создать</button>
            </div>
        </div>
        <div class="form-group">
            <label>🖥️ Путь к FreeFEM++</label>
            <input type="text" id="freefemPath" placeholder="C:\Program Files\FreeFem++\FreeFem++.exe">
            <small>Оставьте пустым, если FreeFEM добавлен в PATH</small>
        </div>
        <div class="actions">
            <button class="btn-secondary" onclick="closeModal('settingsModal')">Отмена</button>
            <button class="btn-primary" onclick="saveSettings()">Сохранить</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
