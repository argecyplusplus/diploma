<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FF Pro — моделирование лопаток ГТД{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <h1>FF Pro</h1>
        <p>моделирование лопаток ГТД</p>
    </div>
    <nav class="sidebar-nav">
        <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}"><i>🏠</i> <span>Главная</span></a>
        <a href="/blades" class="nav-item {% if 'blades' in request.path %}active{% endif %}"><i>📐</i> <span>Лопатки</span></a>
        <a href="/approximation" class="nav-item {% if 'approximation' in request.path %}active{% endif %}"><i>📊</i> <span>Аппроксимация</span></a>
        <a href="/materials" class="nav-item {% if 'materials' in request.path %}active{% endif %}"><i>🧪</i> <span>Материалы</span></a>
        <a href="/simulation" class="nav-item {% if 'simulation' in request.path %}active{% endif %}"><i>⚙️</i> <span>Моделирование</span></a>
    </nav>
</aside>

<header class="header">
    <div class="db-status">
        <span class="db-badge"></span>
        <span id="dbStatusText">БД не выбрана</span>
    </div>
    <button class="settings-btn" onclick="openSettings()">⚙️ Настройки</button>
</header>

<main class="main">
    {% block content %}{% endblock %}
</main>

<!-- Модальное окно настроек -->
<div id="settingsModal" class="modal-overlay">
    <div class="modal modal-wide">
        <h3>⚙️ Настройки FF Pro</h3>
        <div class="form-group">
            <label>📁 База данных</label>
            <select id="dbSelect">
                <option value="">Выберите или создайте БД</option>
            </select>
            <button class="btn-primary" style="margin-top:8px; width:100%;">Создать</button>
        </div>
        <div class="form-group">
            <label>🖥️ Путь к FreeFEM++</label>
            <input type="text" id="freefemPath" placeholder="Оставьте пустым, если FreeFEM добавлен в PATH">
            <small>Укажите полный путь к исполняемому файлу FreeFEM++</small>
        </div>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeSettings()">Отмена</button>
            <button class="btn-primary" onclick="saveSettings()">Сохранить</button>
        </div>
    </div>
</div>

<!-- Подключаем скрипты -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}

<!-- === ГЛОБАЛЬНЫЕ ФУНКЦИИ ДЛЯ МОДАЛОК === -->
<script>
    window.openSettings = function() {
        const modal = document.getElementById('settingsModal');
        if (modal) modal.classList.add('active');
        if (typeof initSettingsModal === 'function') initSettingsModal();
    };
    window.closeSettings = function() {
        const modal = document.getElementById('settingsModal');
        if (modal) modal.classList.remove('active');
    };
    window.saveSettings = function() {
        // Если в main.js есть обработчик сохранения — вызываем его
        if (typeof handleSettingsSave === 'function') {
            handleSettingsSave();
        } else {
            // Fallback: просто закрываем
            closeSettings();
            alert('Настройки сохранены (требуется перезагрузка)');
        }
    };
