<!DOCTYPE html>
<html>
<head>
    <title>Результат расчета</title>
    <style>
        pre { background: #222; color: #0f0; padding: 15px; overflow-x: auto; }
        .status { font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>Статус выполнения FreeFEM++</h2>
    <div class="status">Файл сохранен в: {{ file_path }}</div>
    
    <h3>Лог терминала:</h3>
    <pre>{{ output }}</pre>
    
    <a href="/">Вернуться к настройкам</a>

    <h2>Результаты моделирования</h2>
    <div class="container mt-4">
        <h2>Результаты теплового расчета (v_001)</h2>
        
        <div class="row">
            <div class="col-md-12 mb-4">
                <div class="card">
                    <div class="card-body">
                        <img src="/generated/plot_evolution_v001.png" class="img-fluid" alt="Эволюция температуры">
                    </div>
                </div>
            </div>
    
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <img src="/generated/plot_profile_v001.png" class="img-fluid" alt="Распределение по профилю">
                    </div>
                </div>
            </div>
    
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <img src="/generated/plot_heatmap_v001.png" class="img-fluid" alt="Тепловая карта">
                    </div>
                </div>
            </div>
        </div>
    </div>


</body>
</html>
